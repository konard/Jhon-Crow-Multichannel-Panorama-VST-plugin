name: Build VST Plugin

on:
  push:
    branches:
      - main
      - issue-1-b5e8eaf41aa4
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-preparation:
    name: Validate repository preparation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check required preparation files
        run: bash scripts/validate-preparation.sh

      - name: Configure CMake without plugin dependency fetch
        run: cmake -S . -B build/prepare-smoke -DMULTICHANNEL_PANORAMA_BUILD_PLUGIN=OFF

  build-windows-vst3:
    name: Build Windows VST3 (${{ matrix.label }})
    runs-on: windows-latest
    needs: validate-preparation

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: win32
            cmake_arch: Win32
            build_dir: build/win32
            artifact_name: MultichannelPanorama-vst3-win32
          - label: win64
            cmake_arch: x64
            build_dir: build/win64
            artifact_name: MultichannelPanorama-vst3-win64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure CMake
        shell: pwsh
        run: >
          cmake -S . -B "${{ matrix.build_dir }}"
          -G "Visual Studio 17 2022"
          -A "${{ matrix.cmake_arch }}"
          -DCMAKE_BUILD_TYPE=Release

      - name: Build VST3
        shell: pwsh
        run: cmake --build "${{ matrix.build_dir }}" --config Release --target MultichannelPanorama_VST3

      - name: Stage VST3 artifact
        shell: pwsh
        run: |
          $stage = "dist/${{ matrix.artifact_name }}"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item -Path "${{ matrix.build_dir }}/artifacts/vst3/*" -Destination $stage -Recurse -Force
          Get-ChildItem -Path $stage -Recurse

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error
          retention-days: 14
